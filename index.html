<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <title>UGRI BUGRI - </title>
    <style>
        html, body { margin: 0; padding: 0; width: 100%; height: 100%; }
        body { overflow: hidden; background: #1e528e; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; touch-action: none; overscroll-behavior: none; -webkit-overflow-scrolling: auto; -webkit-user-select: none; user-select: none; -webkit-tap-highlight-color: transparent; }
        canvas { display: block; position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        
        #ui {
            position: absolute;
            top: 20px;
            left: 80px; /* jobbra tolva, hogy a hamburger gomb ne takarja */
            color: #eef7ff;
            text-shadow: 0 2px 6px rgba(0,0,0,0.5);
            font-size: 24px;
            display: none;
            z-index: 10;
            padding: 10px 18px;
            border-radius: 999px;
            border: 1px solid rgba(255, 220, 138, 0.55);
            background:
                linear-gradient(180deg, rgba(26, 40, 78, 0.82), rgba(11, 20, 44, 0.86)),
                radial-gradient(circle at 20% 18%, rgba(255, 204, 105, 0.22), rgba(255, 204, 105, 0));
            box-shadow:
                0 10px 22px rgba(0,0,0,0.32),
                inset 0 1px 0 rgba(255,255,255,0.2),
                inset 0 -10px 18px rgba(0,0,0,0.22);
            -webkit-backdrop-filter: blur(6px);
            backdrop-filter: blur(6px);
            transition: transform 0.3s ease;
            overflow: hidden;
            align-items: center;
            gap: 8px;
        }
        #ui::before {
            content: "";
            position: absolute;
            top: -120%;
            left: -36%;
            width: 34%;
            height: 280%;
            transform: rotate(18deg);
            background: linear-gradient(110deg, rgba(255,255,255,0), rgba(255,255,255,0.2), rgba(255,255,255,0));
            animation: uiSheen 6.2s ease-in-out infinite;
            pointer-events: none;
        }
        #ui::after {
            content: "";
            position: absolute;
            inset: 0;
            border-radius: inherit;
            border: 1px solid rgba(255,255,255,0.09);
            pointer-events: none;
        }
        @keyframes uiSheen {
            0%, 100% { left: -42%; opacity: 0.08; }
            48% { left: 118%; opacity: 0.38; }
        }
        #ui > * { pointer-events: auto; }
        #ui #lvlDisplay, #ui #score {
            color: #ffe082;
            text-shadow: 0 0 12px rgba(255, 206, 92, 0.35), 0 2px 4px rgba(0,0,0,0.45);
            font-weight: 900;
        }
        #heartsUI {
            position: absolute;
            top: 76px;
            left: 82px;
            display: none;
            z-index: 10;
            gap: 12px;
            align-items: center;
            padding: 8px 12px;
            border-radius: 14px;
            border: 1px solid rgba(255, 220, 138, 0.45);
            background: linear-gradient(180deg, rgba(18, 30, 60, 0.78), rgba(10, 18, 40, 0.82));
            box-shadow: 0 8px 20px rgba(0,0,0,0.28), inset 0 1px 0 rgba(255,255,255,0.14);
            -webkit-backdrop-filter: blur(4px);
            backdrop-filter: blur(4px);
        }
        .pixel-heart {
            width: 28px;
            height: 24px;
            display: inline-block;
            flex-shrink: 0;
            position: relative;
        }
        .pixel-heart::before {
            content: "";
            position: absolute;
            left: 4px;
            top: 0;
            width: 4px;
            height: 4px;
            background: currentColor;
            box-shadow:
                4px 0 currentColor,
                12px 0 currentColor,
                16px 0 currentColor,
                -4px 4px currentColor,
                0 4px currentColor,
                4px 4px currentColor,
                8px 4px currentColor,
                12px 4px currentColor,
                16px 4px currentColor,
                20px 4px currentColor,
                -4px 8px currentColor,
                0 8px currentColor,
                4px 8px currentColor,
                8px 8px currentColor,
                12px 8px currentColor,
                16px 8px currentColor,
                20px 8px currentColor,
                0 12px currentColor,
                4px 12px currentColor,
                8px 12px currentColor,
                12px 12px currentColor,
                16px 12px currentColor,
                4px 16px currentColor,
                8px 16px currentColor,
                12px 16px currentColor,
                8px 20px currentColor;
        }
        .pixel-heart.full { color: #ff4d6d; filter: drop-shadow(0 0 5px rgba(255, 77, 109, 0.5)); }
        .pixel-heart.empty { color: rgba(255, 255, 255, 0.22); }
        .pixel-heart.lost {
            animation: heartLosePop 0.42s cubic-bezier(0.2, 0.9, 0.2, 1) forwards;
        }
        .pixel-heart.lost::before {
            animation: heartLoseFlash 0.42s ease-out forwards;
        }
        @keyframes heartLosePop {
            0% { transform: scale(1); }
            32% { transform: scale(1.34); }
            66% { transform: scale(0.82); }
            100% { transform: scale(1); }
        }
        @keyframes heartLoseFlash {
            0% { filter: drop-shadow(0 0 0 rgba(255, 77, 109, 0)); }
            40% { filter: drop-shadow(0 0 10px rgba(255, 77, 109, 0.85)); }
            100% { filter: drop-shadow(0 0 0 rgba(255, 77, 109, 0)); }
        }
        #ui .pop { animation: popAnim 0.4s ease; }
        @keyframes popAnim { 0% { transform: scale(1); } 50% { transform: scale(1.4); } 100% { transform: scale(1); } }
        #timerUI {
            position: absolute;
            top: 20px;
            right: 20px;
            color: #fff2b0;
            text-shadow: 0 2px 6px rgba(0,0,0,0.55);
            font-size: 28px;
            display: none;
            font-weight: 900;
            z-index: 10;
            padding: 10px 16px;
            border-radius: 18px;
            border: 1px solid rgba(255, 208, 98, 0.6);
            background:
                linear-gradient(180deg, rgba(28, 32, 62, 0.86), rgba(16, 19, 42, 0.88)),
                radial-gradient(circle at 18% 18%, rgba(255, 201, 86, 0.28), rgba(255, 201, 86, 0));
            box-shadow:
                0 10px 22px rgba(0,0,0,0.35),
                inset 0 1px 0 rgba(255,255,255,0.18),
                inset 0 -12px 20px rgba(0,0,0,0.22);
            letter-spacing: 0.6px;
            overflow: hidden;
        }
        #timerUI::before {
            content: "";
            position: absolute;
            inset: 1px;
            border-radius: inherit;
            border: 1px solid rgba(255,255,255,0.08);
            pointer-events: none;
        }
        #timerUI #timeVal {
            color: #ffd869;
            text-shadow: 0 0 12px rgba(255, 210, 96, 0.46), 0 2px 4px rgba(0,0,0,0.45);
        }
        /* látványos időmérő-lüktetés */
        @keyframes timerPulse { 0% { transform: scale(1); text-shadow: 2px 2px 2px #000; } 50% { transform: scale(1.2); text-shadow: 2px 2px 10px #ffeb3b; } 100% { transform: scale(1); text-shadow: 2px 2px 2px #000; } }
        #timerUI.pulse { animation: timerPulse 0.5s ease; }

        #mobileControls {
            position: fixed;
            left: 0;
            right: 0;
            bottom: 12px;
            bottom: max(12px, env(safe-area-inset-bottom));
            display: none;
            justify-content: space-between;
            align-items: flex-end;
            padding: 0 14px;
            z-index: 140;
            pointer-events: none;
        }
        #mobileControls.show {
            display: flex;
        }
        .mobile-cluster {
            display: flex;
            gap: 12px;
            align-items: center;
            pointer-events: auto;
        }
        .mobile-btn {
            width: 74px;
            height: 74px;
            border-radius: 24px;
            border: 1px solid rgba(255,255,255,0.22);
            background: rgba(8, 20, 44, 0.18);
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.1), 0 10px 22px rgba(0,0,0,0.18);
            -webkit-backdrop-filter: blur(5px);
            backdrop-filter: blur(5px);
            color: rgba(255,255,255,0.84);
            font-size: 34px;
            font-weight: 900;
            touch-action: none;
            pointer-events: auto;
        }
        .mobile-btn.pressed {
            transform: translateY(2px) scale(0.96);
            background: rgba(255,255,255,0.14);
            border-color: rgba(255,255,255,0.32);
            color: rgba(255,255,255,0.98);
        }
        #jumpTouchBtn {
            width: 86px;
            height: 86px;
            border-radius: 50%;
            font-size: 38px;
        }
        #rotatePhoneHint {
            position: fixed;
            inset: 0;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 24px;
            background: rgba(4, 10, 24, 0.82);
            color: #fff2bf;
            z-index: 320;
            text-align: center;
            -webkit-backdrop-filter: blur(8px);
            backdrop-filter: blur(8px);
        }
        #rotatePhoneHint .rotate-card {
            max-width: 320px;
            padding: 22px 20px;
            border-radius: 24px;
            border: 1px solid rgba(255,255,255,0.14);
            background: linear-gradient(180deg, rgba(24, 36, 70, 0.92), rgba(10, 16, 34, 0.94));
            box-shadow: 0 16px 34px rgba(0,0,0,0.32);
        }
        #rotatePhoneHint .rotate-icon {
            font-size: 42px;
            margin-bottom: 10px;
        }
        #rotatePhoneHint .rotate-title {
            font-size: 26px;
            font-weight: 900;
            margin-bottom: 8px;
        }
        #rotatePhoneHint .rotate-copy {
            font-size: 16px;
            line-height: 1.35;
            color: rgba(255,245,204,0.88);
        }

        @media (pointer: coarse) and (orientation: landscape) {
            #ui {
                top: 10px;
                top: max(10px, env(safe-area-inset-top));
                left: 72px;
                font-size: 17px;
                padding: 8px 12px;
                gap: 6px;
            }
            #heartsUI {
                top: 52px;
                top: calc(max(10px, env(safe-area-inset-top)) + 42px);
                left: 74px;
                gap: 8px;
                padding: 6px 10px;
            }
            .pixel-heart {
                width: 24px;
                height: 20px;
            }
            #timerUI {
                top: 10px;
                top: max(10px, env(safe-area-inset-top));
                right: 10px;
                font-size: 18px;
                padding: 8px 12px;
            }
            #menuBtn.hamburger {
                top: 10px;
                top: max(10px, env(safe-area-inset-top));
                left: 10px;
                width: 48px;
                height: 48px;
                font-size: 22px;
            }
            #mainMenu {
                padding: 14px 12px;
                box-sizing: border-box;
                justify-content: flex-start;
                overflow-y: auto;
            }
            #menuTitle {
                margin-top: 10px;
                margin-bottom: 14px;
                font-size: clamp(36px, 8vw, 60px);
                letter-spacing: 3px;
            }
            .btn-container {
                gap: 12px;
                width: min(92vw, 740px);
            }
            .btn {
                padding: 12px 22px;
                font-size: 18px;
                min-width: 120px;
            }
            #levelButtonsContainer {
                width: min(92vw, 760px);
                overflow-x: auto;
                padding-bottom: 6px;
            }
            #leaderboard, #stats, #achievementsPanel {
                width: min(92vw, 720px);
                min-width: 0;
                box-sizing: border-box;
            }
            #stats {
                font-size: 14px;
                margin-top: 10px;
            }
            #resetBtn {
                margin-top: 10px;
                margin-bottom: 8px;
            }
            #msg {
                min-width: min(90vw, 720px);
                font-size: clamp(22px, 4.8vw, 42px);
                padding: 14px 16px;
                white-space: pre-wrap;
            }
            #achievementToast {
                width: min(86vw, 420px);
                right: 10px;
                top: 66px;
                top: calc(max(10px, env(safe-area-inset-top)) + 56px);
            }
        }

        @media (pointer: coarse) and (orientation: portrait) {
            #rotatePhoneHint {
                display: flex;
            }
        }
        
        #splashScreen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; color: white; display: flex; align-items: center; justify-content: center; 
            z-index: 300; cursor: pointer; transition: opacity 1s ease-in-out, transform 1s ease-in-out;
        }
        #splashScreen h1 {
            font-size: clamp(30px, 6vw, 60px); font-weight: 900; letter-spacing: 5px; text-align: center;
            animation: pulseText 1.5s infinite; text-shadow: 0 0 20px rgba(255, 255, 255, 0.4);
        }
        @keyframes pulseText { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.3; transform: scale(0.98); } }

        #mainMenu {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background:
                radial-gradient(1200px 620px at 14% 16%, rgba(255, 207, 120, 0.2), rgba(255, 207, 120, 0)),
                radial-gradient(1000px 560px at 84% 24%, rgba(95, 196, 255, 0.2), rgba(95, 196, 255, 0)),
                linear-gradient(180deg, rgba(9, 18, 46, 0.88), rgba(7, 14, 36, 0.93));
            display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 200;
            overflow: hidden;
        }

        #mainMenu::before {
            content: "";
            position: absolute;
            inset: -12%;
            background: repeating-linear-gradient(
                -30deg,
                rgba(255,255,255,0.05) 0px,
                rgba(255,255,255,0.05) 2px,
                rgba(255,255,255,0) 2px,
                rgba(255,255,255,0) 20px
            );
            opacity: 0.18;
            animation: menuPatternDrift 18s linear infinite;
            pointer-events: none;
        }

        @keyframes menuPatternDrift {
            0% { transform: translate3d(-3%, -2%, 0); }
            100% { transform: translate3d(3%, 2%, 0); }
        }

        #menuTitle {
            color: #ffe59d;
            font-size: clamp(64px, 12vw, 110px);
            font-weight: 900;
            margin-bottom: 36px;
            letter-spacing: 6px;
            text-align: center;
            font-style: italic;
            text-transform: uppercase;
            text-shadow:
                0 2px 0 #ff9f1a,
                0 8px 0 #d35400,
                0 16px 24px rgba(0,0,0,0.45),
                0 0 24px rgba(255, 210, 110, 0.28);
            animation: titleJump 2s infinite ease-in-out, titleGlowPulse 2.8s ease-in-out infinite;
            user-select: none;
            position: relative;
            z-index: 210;
        }

       
        @keyframes titleGlowPulse {
            0%, 100% { filter: drop-shadow(0 0 0 rgba(255, 217, 115, 0.0)); }
            50% { filter: drop-shadow(0 0 20px rgba(255, 217, 115, 0.42)); }
        }
        @keyframes titleJump { 0%, 100% { transform: translateY(0) rotate(-2deg) scale(1); } 50% { transform: translateY(-20px) rotate(2deg) scale(1.05); } }

        .btn-container { display: flex; gap: 25px; z-index: 210; align-items: center; justify-content: center; flex-wrap: wrap; }
        .btn {
            padding: 18px 45px;
            font-size: 26px;
            cursor: pointer;
            border: 2px solid rgba(255,255,255,0.82);
            border-radius: 50px;
            color: #fff;
            transition: transform 0.2s cubic-bezier(0.19, 1, 0.22, 1), filter 0.2s ease, box-shadow 0.2s ease;
            font-weight: 900;
            text-transform: uppercase;
            position: relative;
            overflow: hidden;
            isolation: isolate;
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
            box-shadow: 0 10px 0 rgba(0,0,0,0.24), 0 16px 26px rgba(0,0,0,0.24);
        }
        .btn::before {
            content: "";
            position: absolute;
            left: -22%;
            top: 0;
            width: 40%;
            height: 100%;
            background: linear-gradient(110deg, rgba(255,255,255,0), rgba(255,255,255,0.35), rgba(255,255,255,0));
            transform: skewX(-25deg);
            transition: left 0.35s ease;
            z-index: -1;
        }
        .btn:hover::before { left: 120%; }

        #startBtn {
            background: linear-gradient(180deg, #ff7a59, #e74c3c 55%, #be2f22);
            box-shadow: 0 10px 0 #97231a, 0 18px 30px rgba(152, 34, 21, 0.4);
        }
        #speedrunBtn {
            background: linear-gradient(180deg, #ffd05f, #f39c12 55%, #c87500);
            box-shadow: 0 10px 0 #9a5a00, 0 18px 30px rgba(143, 92, 9, 0.4);
        }
        #backBtn {
            background: linear-gradient(180deg, #63c0ff, #3498db 55%, #2276ac);
            box-shadow: 0 10px 0 #1d5f89, 0 18px 30px rgba(32, 93, 132, 0.4);
        }
        #achievementsBtn {
            background: linear-gradient(180deg, #8de3ff, #39bde6 55%, #1f89b4);
            box-shadow: 0 10px 0 #176889, 0 18px 30px rgba(28, 115, 148, 0.42);
        }
        .level-btn {
            color: white;
            padding: 8px 20px;
            font-size: 18px;
            border-radius: 30px;
            margin: 2px;
        }
        .level-btn.locked {
            color: #d0d7de;
            background: linear-gradient(180deg, #7d8792, #59636d 55%, #384047) !important;
            box-shadow: 0 10px 0 #2b3137, 0 16px 24px rgba(18, 22, 27, 0.3) !important;
            filter: grayscale(1) brightness(0.82);
            cursor: not-allowed;
            pointer-events: none;
        }
        
        #muteBtn { 
            background: linear-gradient(180deg, #7dd3fc, #1f9fdb 58%, #1577a7);
            box-shadow: 0 10px 0 #125f85, 0 16px 26px rgba(16, 72, 102, 0.45);
            padding: 18px; width: 75px; height: 75px; 
            display: flex; align-items: center; justify-content: center; font-size: 32px;
        }
        
        #resetBtn { background: #7f8c8d; box-shadow: 0 10px 0 #2c3e50; font-size: 18px; padding: 10px 25px; margin-top: 15px; }

        .btn:hover { transform: translateY(-3px) scale(1.06); filter: brightness(1.08) saturate(1.08); }
        .btn:active { transform: translateY(6px) scale(0.99); box-shadow: 0 4px 0 rgba(40,40,40,0.55); }
        #menuBtn.hamburger { position:absolute; top:20px; left:20px; z-index:11; width:50px; height:50px; padding:0; font-size:24px; line-height:40px; text-align:center; background: linear-gradient(135deg, #f39c12, #e74c3c); border-radius: 25px; box-shadow: 0 6px 0 rgba(0,0,0,0.2); transition: transform 0.3s ease, background 0.3s ease; pointer-events:auto; }
        #menuBtn.hamburger:hover { transform: scale(1.2) rotate(90deg); background: linear-gradient(135deg, #e74c3c, #c0392b); }
        @keyframes popIn { 0% { transform: scale(0); } 60% { transform: scale(1.2); } 100% { transform: scale(1); } }
        #menuBtn.hamburger.showAnim { animation: popIn 0.4s ease; }
        @keyframes clickOut { 0% { transform: scale(1) rotate(0); } 50% { transform: scale(1.3) rotate(45deg); } 100% { transform: scale(0) rotate(90deg); opacity:0; }
        }
        #menuBtn.hamburger.clickAnim { animation: clickOut 0.5s forwards; }
        @keyframes menuFadeIn { 0% { opacity: 0; transform: scale(0.9); } 100% { opacity: 1; transform: scale(1); } }
        #mainMenu.showMenu { animation: menuFadeIn 0.5s ease forwards; }
        @keyframes menuReturnIn {
            0% { opacity: 0; transform: scale(1.03); filter: blur(10px); }
            100% { opacity: 1; transform: scale(1); filter: blur(0); }
        }
        #mainMenu.menu-return-in {
            animation: menuReturnIn 0.72s cubic-bezier(0.22, 1, 0.36, 1) forwards;
        }
        #levelButtonsContainer { scrollbar-width: none; -ms-overflow-style: none; }
        #levelButtonsContainer::-webkit-scrollbar { display: none; }
        #levelButtonsContainer {
            transition: transform 0.4s ease, opacity 0.4s ease;
            transform: translateY(100%);
            opacity: 0;
            width: min(1100px, calc(100vw - 30px));
            max-width: calc(100vw - 30px);
            box-sizing: border-box;
            padding: 8px 18px 16px;
            margin: 0 auto;
            overflow-x: auto;
            overflow-y: visible;
            justify-content: flex-start;
            align-items: center;
        }
        #levelButtonsContainer.show {
            transform: translateY(0);
            opacity: 1;
        }
        #achievementsSection {
            transition: transform 0.4s ease, opacity 0.4s ease;
            transform: translateY(100%);
            opacity: 0;
            width: min(720px, calc(100vw - 30px));
            max-width: calc(100vw - 30px);
            box-sizing: border-box;
            margin: 0 auto;
            display: none;
            flex-direction: column;
            align-items: center;
        }
        #achievementsSection.show {
            transform: translateY(0);
            opacity: 1;
        }
        
        #stats { color: white; font-size: 20px; margin-top: 20px; text-align: center; line-height: 1.6; z-index: 210; text-shadow: 1px 1px 3px rgba(0,0,0,0.3); background: rgba(0,0,0,0.15); padding: 10px; border-radius: 20px; }
        #msg {
            position: absolute;
            top: 40%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.84);
            color: #ffe9a8;
            font-size: clamp(32px, 5vw, 62px);
            font-weight: 900;
            letter-spacing: 1.2px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.55), 0 0 26px rgba(255, 210, 94, 0.34);
            display: none;
            text-align: center;
            z-index: 150;
            white-space: pre;
            min-width: min(760px, 84vw);
            padding: 18px 28px;
            border-radius: 26px;
            border: 2px solid rgba(255, 214, 122, 0.68);
            background:
                linear-gradient(180deg, rgba(24, 37, 72, 0.9), rgba(14, 22, 48, 0.92)),
                radial-gradient(circle at 12% 18%, rgba(255, 195, 82, 0.28), rgba(255, 195, 82, 0));
            box-shadow:
                0 26px 46px rgba(0,0,0,0.4),
                inset 0 1px 0 rgba(255,255,255,0.24),
                inset 0 -14px 28px rgba(0,0,0,0.28);
            -webkit-backdrop-filter: blur(7px);
            backdrop-filter: blur(7px);
            opacity: 0;
            overflow: hidden;
            pointer-events: none;
        }
        #msg::before {
            content: "";
            position: absolute;
            top: -130%;
            left: -36%;
            width: 34%;
            height: 300%;
            transform: rotate(18deg);
            background: linear-gradient(110deg, rgba(255,255,255,0), rgba(255,255,255,0.24), rgba(255,255,255,0));
            opacity: 0;
        }
        #msg::after {
            content: "";
            position: absolute;
            inset: 1px;
            border-radius: inherit;
            border: 1px solid rgba(255,255,255,0.08);
            pointer-events: none;
        }
        #msg.show {
            display: block;
            animation: msgIntro 0.58s cubic-bezier(0.2, 0.9, 0.2, 1) forwards;
        }
        #msg.level-complete {
            border-color: rgba(255, 212, 102, 0.82);
            box-shadow:
                0 28px 48px rgba(0,0,0,0.42),
                0 0 24px rgba(255, 203, 90, 0.36),
                inset 0 1px 0 rgba(255,255,255,0.24),
                inset 0 -14px 28px rgba(0,0,0,0.28);
            animation: msgIntro 0.58s cubic-bezier(0.2, 0.9, 0.2, 1) forwards, msgFloat 1.7s ease-in-out infinite;

        #msg.level-complete::before {
            opacity: 1;
            animation: msgSheen 1.35s ease-out infinite;
        }
        @keyframes msgIntro {
            0% { opacity: 0; transform: translate(-50%, -50%) scale(0.84); }

            100% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
        }
        @keyframes msgFloat {
            0%, 100% { transform: translate(-50%, -50%) translateY(0); }
            50% { transform: translate(-50%, -50%) translateY(-4px); }
        }
        @keyframes msgSheen {
            0% { left: -42%; opacity: 0; }
            20% { opacity: 0.34; }
            100% { left: 118%; opacity: 0; }

        @keyframes gameOverDrop {
            0%   { opacity: 0;   transform: translate(-50%, -160%) scale(1.1) rotate(-3deg); }

            65%  { opacity: 1;   transform: translate(-50%, -44%) scale(1.04) rotate(1.5deg); }

        @keyframes gameOverRedPulse {

            0%   { top: -10%; opacity: 0.22; }
            100% { top: 110%; opacity: 0.08; }

            opacity: 1;
            color: #ff5a5a;
            border-color: rgba(220, 60, 60, 0.85);
            text-shadow: 0 0 18px rgba(255, 60, 60, 0.8), 0 2px 10px rgba(0,0,0,0.65);

                linear-gradient(180deg, rgba(58, 14, 14, 0.94), rgba(28, 8, 8, 0.96)),

                       gameOverRedPulse 1.4s ease-in-out 1.1s infinite;
        }
        #msg.game-over::before {
            content: "";
            position: absolute;
            left: 0; width: 100%; height: 18%;
            background: linear-gradient(0deg, rgba(255,255,255,0) 0%, rgba(255,80,80,0.1) 50%, rgba(255,255,255,0) 100%);

        }
        @keyframes allCompleteRise {
            0%   { opacity: 0; transform: translate(-50%, 60%) scale(0.78); }
            18%  { opacity: 0; transform: translate(-50%, 60%) scale(0.78); }
            55%  { opacity: 1; transform: translate(-50%, -56%) scale(1.07); }
            72%  { opacity: 1; transform: translate(-50%, -47%) scale(0.97); }
            85%  { opacity: 1; transform: translate(-50%, -52%) scale(1.02); }
            100% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
        }
        @keyframes allCompleteGoldPulse {
            0%, 100% { box-shadow: 0 28px 52px rgba(0,0,0,0.45), 0 0 18px rgba(255,200,60,0.3), inset 0 1px 0 rgba(255,255,255,0.26); }
            50%       { box-shadow: 0 34px 72px rgba(0,0,0,0.52), 0 0 72px rgba(255,210,70,0.65), inset 0 1px 0 rgba(255,255,255,0.26); }
        }
        @keyframes allCompleteStarfield {
            0%   { left: -120%; opacity: 1; }

            100% { left: 160%;  opacity: 0.4; }
        }
        #msg.all-complete {
            opacity: 1;
            color: #fff7c2;
            border-color: rgba(255, 218, 80, 0.9);

                linear-gradient(180deg, rgba(38, 28, 4, 0.95), rgba(18, 12, 2, 0.97)),

        }
        #msg.all-complete::before {
            content: "";

            top: -50%;
            left: -120%;

                rgba(255, 230, 130, 0.2) 60%,

            animation: allCompleteStarfield 2.6s ease-in-out 1.0s infinite;

            return value.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');

            const markup = iconMarkup || defaultAchievementIconMarkup;
            const scopeId = 'achievementIconScope' + (achievementIconInstanceCounter++);
            const svgIds = [];

            let scopedMarkup = markup.replace(/\bid="([^"]+)"/g, (_, id) => {
                svgIds.push(id);
                return `id="${id}-${scopeId}"`;
            });

            svgIds.forEach(id => {
                const escapedId = escapeRegex(id);
                scopedMarkup = scopedMarkup.replace(new RegExp(`url\\(#${escapedId}\\)`, 'g'), `url(#${id}-${scopeId})`);
                scopedMarkup = scopedMarkup.replace(new RegExp(`href="#${escapedId}"`, 'g'), `href="#${id}-${scopeId}"`);
                scopedMarkup = scopedMarkup.replace(new RegExp(`xlink:href="#${escapedId}"`, 'g'), `xlink:href="#${id}-${scopeId}"`);
            });

            return scopedMarkup;

                gain.gain.setValueAtTime(vol, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
                osc.connect(gain); gain.connect(audioCtx.destination);
                osc.start(); osc.stop(audioCtx.currentTime + duration);
            } catch(e) {}
        }

        function playToneSweep(freqStart, freqEnd, type, duration, vol = 0.03, attack = 0.003, filterFreq = null) {
            try {
                const now = audioCtx.currentTime;
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();

                osc.type = type;
                osc.frequency.setValueAtTime(Math.max(20, freqStart), now);
                osc.frequency.exponentialRampToValueAtTime(Math.max(20, freqEnd), now + duration);

                let lastNode = osc;
                if (filterFreq) {
                    const filter = audioCtx.createBiquadFilter();
                    filter.type = 'lowpass';
                    filter.frequency.setValueAtTime(filterFreq, now);
                    lastNode.connect(filter);
                    lastNode = filter;
                }

                gain.gain.setValueAtTime(0.0001, now);
                gain.gain.exponentialRampToValueAtTime(Math.max(0.0001, vol), now + attack);
                gain.gain.exponentialRampToValueAtTime(0.0001, now + duration);

                lastNode.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start(now);
                osc.stop(now + duration + 0.03);
            } catch (e) {}
        }

        let particles = [];

        function createParticles(x, y, color, count = 8, speed = 5, size = 4) {
            const maxParticles = isTouchDevice ? 90 : 160;
            const adjustedCount = Math.max(1, Math.min(count, isTouchDevice ? Math.ceil(count * 0.65) : count));
            if (particles.length >= maxParticles) return;
            const spawnCount = Math.min(adjustedCount, maxParticles - particles.length);
            for (let i = 0; i < spawnCount; i++) { particles.push({ x: x, y: y, vx: (Math.random() - 0.5) * speed, vy: (Math.random() - 0.5) * speed, size: Math.random() * size + 2, color: color, life: 1.0, decay: Math.random() * 0.05 + 0.02 }); }
        }
        function updateParticles(dt) {
            for (let i = particles.length - 1; i >= 0; i--) {
                let p = particles[i]; p.x += p.vx * dt; p.y += p.vy * dt; p.life -= p.decay * dt;
                if (p.life <= 0) particles.splice(i, 1);
            }
        }
        function drawParticles() {
            for (let i = 0; i < particles.length; i++) {
                const p = particles[i];
                ctx.globalAlpha = p.life;
                ctx.fillStyle = p.color;
                ctx.fillRect(p.x - (gameRunning ? cameraX : 0), p.y, p.size, p.size);
            }
            ctx.globalAlpha = 1.0;
        }

        function drawMountains() {
            let currentCam = gameRunning ? cameraX : 0; let worldW = gameRunning ? levels[currentLevel].worldWidth : canvas.width;
            mountains.forEach(m => {
                let mx = (m.x - currentCam * m.s) % (worldW + 1200); if (mx < -m.w) mx += worldW + 1200;
                const peakX = mx + m.w / 2;
                const peakY = m.y - m.h;

                if (lowDetailMode) {
                    ctx.fillStyle = m.color;
                    ctx.beginPath();
                    ctx.moveTo(mx, canvas.height);
                    ctx.lineTo(peakX, peakY);
                    ctx.lineTo(mx + m.w, canvas.height);
                    ctx.closePath();
                    ctx.fill();

                    ctx.fillStyle = "rgba(15, 28, 58, 0.24)";
                    ctx.beginPath();
                    ctx.moveTo(peakX, peakY);
                    ctx.lineTo(mx + m.w, canvas.height);
                    ctx.lineTo(peakX + m.w * 0.17, canvas.height);
                    ctx.closePath();
                    ctx.fill();
                    return;
                }

                const bodyGrad = ctx.createLinearGradient(peakX, peakY, peakX, canvas.height);
                bodyGrad.addColorStop(0, "rgba(205,225,255,0.22)");
                bodyGrad.addColorStop(0.25, m.color);
                bodyGrad.addColorStop(1, "rgba(32,55,98,0.92)");
                ctx.fillStyle = bodyGrad;
                ctx.beginPath();
                ctx.moveTo(mx, canvas.height);
                ctx.lineTo(peakX, peakY);
                ctx.lineTo(mx + m.w, canvas.height);
                ctx.closePath();
                ctx.fill();

                // a jobb oldali árnyék élesebb tömeget ad a hegynek.
                ctx.fillStyle = "rgba(15, 28, 58, 0.33)";
                ctx.beginPath();
                ctx.moveTo(peakX, peakY);
                ctx.lineTo(mx + m.w, canvas.height);
                ctx.lineTo(peakX + m.w * 0.17, canvas.height);
                ctx.closePath();
                ctx.fill();

                // bal oldali élkiemelés.
                ctx.fillStyle = "rgba(255,255,255,0.08)";
                ctx.beginPath();
                ctx.moveTo(mx, canvas.height);
                ctx.lineTo(peakX, peakY);
                ctx.lineTo(peakX - m.w * 0.15, canvas.height);
                ctx.closePath();
                ctx.fill();

                // a havas csúcs csak a magasabb hegyeken jelenik meg.
                if (m.h > 200) {
                    const capBaseY = peakY + m.h * 0.16;
                    const t = (capBaseY - peakY) / (canvas.height - peakY);
                    const leftEdgeX = peakX + (mx - peakX) * t;
                    const rightEdgeX = peakX + (mx + m.w - peakX) * t;
                    const centerDrop = 8;
                    ctx.fillStyle = "rgba(240,248,255,0.84)";
                    ctx.beginPath();
                    ctx.moveTo(leftEdgeX, capBaseY);
                    ctx.lineTo(peakX, peakY + 2);
                    ctx.lineTo(rightEdgeX, capBaseY);
                    ctx.lineTo(peakX + (rightEdgeX - peakX) * 0.45, capBaseY + centerDrop + 3);
                    ctx.lineTo(peakX, capBaseY + centerDrop);
                    ctx.lineTo(peakX - (peakX - leftEdgeX) * 0.5, capBaseY + centerDrop + 4);
                    ctx.closePath();
                    ctx.fill();
                }

                // finom légköri pára az alján.
                ctx.fillStyle = "rgba(170, 200, 245, 0.1)";
                ctx.beginPath();
                ctx.ellipse(mx + m.w * 0.5, canvas.height - 4, m.w * 0.56, 15, 0, 0, Math.PI * 2);
                ctx.fill();
            });
        }

        function drawAnimatedFlag(fx, fy, isDead) {
            const flagWidth = 84;
            const flagHeight = 50;
            const waveAmplitude = 8;
            const waveFrequency = 0.13;
            const wavePhase = frameNow * 0.006;

            // zászlórúd
            const poleGrad = ctx.createLinearGradient(fx, fy, fx + 8, fy);
            poleGrad.addColorStop(0, "#5b5b5b");
            poleGrad.addColorStop(0.55, "#2f2f2f");
            poleGrad.addColorStop(1, "#1f1f1f");
            ctx.fillStyle = poleGrad;
            ctx.fillRect(fx, fy, 8, 300);
            ctx.fillStyle = "rgba(255,255,255,0.2)";
            ctx.fillRect(fx + 1, fy, 1.5, 300);

            // sapka és díszgomb
            ctx.fillStyle = "#2a2a2a";
            ctx.fillRect(fx - 1, fy - 6, 10, 6);
            ctx.fillStyle = isDead ? "#9aa3aa" : "#ffd86b";
            ctx.beginPath();
            ctx.arc(fx + 4, fy - 9, 3, 0, Math.PI * 2);
            ctx.fill();

            // a zászló vásznának sziluettje
            const topPts = [];
            const botPts = [];
            for (let x = 0; x <= flagWidth; x += 2) {
                const wave = Math.sin(x * waveFrequency - wavePhase) * (x / flagWidth) * waveAmplitude;
                topPts.push({ x: fx + 8 + x, y: fy + wave });
                botPts.push({ x: fx + 8 + x, y: fy + flagHeight + wave });
            }

            ctx.beginPath();
            ctx.moveTo(fx + 8, fy);
            for (let i = 0; i < topPts.length; i++) ctx.lineTo(topPts[i].x, topPts[i].y);
            for (let i = botPts.length - 1; i >= 0; i--) ctx.lineTo(botPts[i].x, botPts[i].y);
            ctx.closePath();

            const clothGrad = ctx.createLinearGradient(fx + 8, fy, fx + 8, fy + flagHeight);
            if (isDead) {
                clothGrad.addColorStop(0, "#9aa0a8");
                clothGrad.addColorStop(0.55, "#7d848d");
                clothGrad.addColorStop(1, "#656d77");
            } else {
                clothGrad.addColorStop(0, "#ff6e5f");
                clothGrad.addColorStop(0.58, "#e74c3c");
                clothGrad.addColorStop(1, "#bf2f23");
            }
            ctx.fillStyle = clothGrad;
            ctx.fill();

            // fénycsík a vászon felső-középső részén
            const glossGrad = ctx.createLinearGradient(fx + 12, fy + 4, fx + flagWidth + 8, fy + 30);
            glossGrad.addColorStop(0, "rgba(255,255,255,0)");
            glossGrad.addColorStop(0.42, "rgba(255,255,255,0.26)");
            glossGrad.addColorStop(1, "rgba(255,255,255,0)");
            ctx.save();
            ctx.clip();
            ctx.fillStyle = glossGrad;
            ctx.fillRect(fx + 8, fy, flagWidth, flagHeight);
            ctx.restore();

            // külső perem és hátsó bevágás
            ctx.strokeStyle = isDead ? "rgba(40,45,50,0.5)" : "rgba(120,25,20,0.55)";
            ctx.lineWidth = 1.2;
            ctx.beginPath();
            ctx.moveTo(fx + 8, fy);
            for (let i = 0; i < topPts.length; i++) ctx.lineTo(topPts[i].x, topPts[i].y);
            ctx.stroke();

            
        }

        function update(timestamp) {

        function draw() {

ctx.shadowBlur = 20;

                for (let platformIndex = 0; platformIndex < visiblePlatforms.length; platformIndex++) {
    const p = visiblePlatforms[platformIndex];

        const tipY = p.y - animatedHeight;
        const cpX = baseX + bend * 0.45;
        const cpY = p.y - animatedHeight * 0.45;

        const hue = 102 + blade.tint + blade.hueJitter;
        const lit = Math.round(blade.lightness + Math.sin(windT * 0.55 + blade.phase) * 4);

        // aljarnyek
        ctx.strokeStyle = "hsla(" + (hue - 8) + ", 55%, " + Math.max(20, lit - 14) + "%, 0.55)";
        ctx.lineWidth = blade.w + 0.7;
        ctx.beginPath();
        ctx.moveTo(baseX - 0.2, p.y + 1);
        ctx.quadraticCurveTo(cpX * 0.98 + baseX * 0.02, cpY + 0.8, tipX, tipY + 1.2);
        ctx.stroke();

        // fo fuszal
        ctx.strokeStyle = "hsl(" + hue + ", 62%, " + lit + "%)";
        ctx.lineWidth = blade.w;
        ctx.beginPath();
        ctx.moveTo(baseX, p.y + 1);
        ctx.quadraticCurveTo(cpX, cpY, tipX, tipY);
        ctx.stroke();

        // fenycsik a szal elejen
        if (!lowDetailMode && blade.gloss) {
            ctx.strokeStyle = "hsla(" + (hue + 8) + ", 72%, " + Math.min(84, lit + 22) + "%, 0.55)";
            ctx.lineWidth = Math.max(0.6, blade.w * 0.42);
            ctx.beginPath();
            ctx.moveTo(baseX + bend * 0.2, p.y - animatedHeight * 0.45);
            ctx.quadraticCurveTo(cpX + bend * 0.1, cpY, tipX, tipY);
            ctx.stroke();
        }

        if (!lowDetailMode && blade.tip) {
            const twinkle = Math.sin(windT * 3.2 + blade.phase * 1.8);
            const glow = Math.max(0, twinkle) * 0.5;
            if (glow > 0.08) {
                ctx.fillStyle = "rgba(220,255,235," + (0.14 + glow * 0.55) + ")";
                ctx.beginPath();
                ctx.arc(tipX, tipY - 0.6, 0.8 + glow * 1.6, 0, Math.PI * 2);
                ctx.fill();
            }
        }
    });

    // árnyék
    ctx.fillStyle = "rgba(0,0,0,0.25)";
    ctx.fillRect(p.x, p.y + p.h, p.w, 8);
}
                activeCoins.forEach(c => drawCoin(c)); 
                activeHearts.forEach(h => drawHeartPickup(h));
                drawAnimatedFlag(levels[currentLevel].flagX, canvas.height - 340, isDead);
                activeEnemies.forEach(en => drawEnemy(en));
                drawCharacter(player.x, player.y, !player.grounded, player.dir, player.velX); 
                ctx.restore();
            }
            ctx.restore();
        }

        createClouds();
        createMountains();
        createStars();
        updateMobileControlsVisibility();
        populateLevelButtons();
        lastTimestamp = performance.now();
        requestAnimationFrame(update);
    </script>
